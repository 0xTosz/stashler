# stasher item-evaluation rules -- edit freely, then run `stasher evaluate`.
#
# Every captured item is checked against all rules below. If ANY rule fires, the item
# is flagged and appears in the UI review queue. The queue is a manual shortlist: most
# captures are trash, so these rules are deliberately TIGHT -- they target top-tier
# rolls only, to surface the small fraction worth a look. Loosen/add rules to taste.
#
# Checker types:
#   [[regex]]        name, pattern, targets (affixes|name|base), ignore_case
#   [[unique_roll]]  name, min_percent, aggregate (avg|max|all)  -- uniques only
#   [item_filter]    enabled = true|false  -- the filter file is edited in Settings
#
# Mod text is matched in in-game wording (e.g. "+30% to Fire Resistance"), not the raw
# "[Fire] Resistance" API markup. Anchor patterns with \+ and digit ranges to stay tight.

# Flat maximum life, top tier only (+120 or more; excludes "Minions have …maximum Life").
[[regex]]
name = "High flat life (T1)"
pattern = "\\+(12\\d|1[3-9]\\d|[2-9]\\d\\d) to maximum Life"
targets = ["affixes"]

# A near-max single elemental/chaos resistance roll (45%+).
[[regex]]
name = "High single resist (45%+)"
pattern = "\\+(4[5-9]|[5-9]\\d)% to (Fire|Cold|Lightning|Chaos) Resistance"
targets = ["affixes"]

# Big "+N to Level of all <type> Skills" (＋4 or more) -- strong on weapons/foci.
[[regex]]
name = "Plus to skill level (4+)"
pattern = "\\+([4-9]|\\d\\d) to Level of all .* Skills"
targets = ["affixes"]

# Top-tier boot movement speed (30%+).
[[regex]]
name = "High movement speed (30%+)"
pattern = "(3\\d|[4-9]\\d)% increased Movement Speed"
targets = ["affixes"]

# Uniques rolling near the top of their ranges (worth a manual price check).
[[unique_roll]]
name = "High-roll unique"
min_percent = 90
aggregate = "avg"

# Item-filter checker on/off. Edit the filter itself in Settings (or upload one) —
# it's a single app-managed file, no path needed here.
[item_filter]
enabled = true
