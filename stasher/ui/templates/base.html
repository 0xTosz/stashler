<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stashler</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='stashler.png') }}">
  <style>
    :root { color-scheme: dark; --gold: #d4a657; --gold-dim: #b8893f; --maxw: 1180px; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #14161a; color: #d7dbe0; }
    a { color: #6cb6ff; text-decoration: none; }
    a:hover { color: #9fccff; }
    header { background: linear-gradient(#1d2027, #181a20); border-bottom: 1px solid #2a2f37;
             padding: 8px 14px; box-shadow: 0 1px 0 #0c0d11; }
    .nav { display: flex; gap: 14px; align-items: center; margin: 0 auto 8px;
           max-width: var(--maxw); }
    .nav .brand { display: flex; align-items: center; gap: 9px; margin-right: 6px; }
    .nav .brand img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover;
                      border: 1px solid var(--gold-dim); box-shadow: 0 0 0 1px #00000040; }
    .nav .brand .name { font: 700 18px/1 "Iowan Old Style", "Palatino Linotype", Georgia, serif;
                        letter-spacing: .3px; color: var(--gold);
                        text-shadow: 0 1px 1px #00000060; }
    .nav .navlink { color: #c2c8d0; padding: 3px 2px; }
    .nav .navlink:hover { color: #fff; }
    .nav .navlink.attn { color: #ff7a7a; font-weight: 700; }
    .nav .navlink.attn:hover { color: #ff9a9a; }
    .nav .spacer { flex: 1; }
    button { font: inherit; background: #2a2f37; color: #d7dbe0; border: 1px solid #3a414b;
             border-radius: 5px; padding: 5px 10px; cursor: pointer; }
    button:hover:not(:disabled) { background: #343b45; }
    button:disabled { opacity: .5; cursor: default; }
    button.active { background: #2f5d8a; border-color: #3f7ab0; color: #eaf3ff; }
    .status { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-start; font-size: 13px;
              max-width: var(--maxw); margin: 0 auto; }
    .pill { padding: 2px 8px; border-radius: 10px; background: #2a2f37; }
    .pill.live { background: #1f4023; color: #9be3a3; }
    .pill.reconnecting { background: #4a3b16; color: #ffd479; }
    .pill.backfill { background: #16384a; color: #87cefa; }
    .buckets { display: flex; gap: 10px; flex-wrap: wrap; }
    .bucket { min-width: 92px; }
    .bucket .bar { height: 6px; background: #2a2f37; border-radius: 3px; overflow: hidden; }
    .bucket .bar > span { display: block; height: 100%; background: #4f9dff; }
    .bucket.warn .bar > span { background: #ffcc55; }
    .bucket.bad .bar > span { background: #ff6b6b; }
    .bucket small { color: #8b929c; }
    .bucket .bar { position: relative; }
    .bucket .bar .mark { position: absolute; top: -1px; bottom: -1px; width: 2px;
                         background: #cfd6df; opacity: .75; }
    .rate-toggle { display: flex; align-items: center; }
    .rate-toggle .muted { margin-right: 6px; }
    .seg { border-radius: 0; padding: 4px 9px; }
    .seg:first-of-type { border-radius: 5px 0 0 5px; }
    .seg:last-of-type { border-radius: 0 5px 5px 0; border-left: none; }
    .seg.active { background: #2f5d8a; border-color: #3f7ab0; color: #eaf3ff; }
    .feed { max-height: 120px; overflow: auto; min-width: 260px; flex: 1; }
    .feed div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ok { color: #9be3a3; } .rate_limited { color: #ffd479; } .error { color: #ff8a8a; }
    main { max-width: var(--maxw); margin: 0 auto; padding: 20px 22px 40px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #23272e; }
    th { color: #9aa1ab; font-weight: 600; }
    input, select { font: inherit; background: #1b1e24; color: #d7dbe0;
                    border: 1px solid #3a414b; border-radius: 5px; padding: 5px 8px; }
    .muted { color: #8b929c; }

    /* --- shared item tooltip card (queue + records expand) --- */
    .qcard { display: flex; gap: 14px; align-items: flex-start; padding: 12px;
             border: 1px solid #23272e; border-radius: 8px; margin-bottom: 12px; background: #15171c; }
    .qcard.seen { opacity: .45; }
    .qicon { width: 64px; height: 64px; object-fit: contain; flex: none; }
    .tooltip { flex: 1; min-width: 320px; max-width: 620px; background: #0c0d11;
               border: 1px solid #2a2f37; border-radius: 6px; overflow: hidden; text-align: center; }
    .t-head { padding: 7px 10px; background: linear-gradient(#20242c, #171a20); border-bottom: 1px solid #2a2f37; }
    .t-name { font-weight: 700; letter-spacing: .3px; }
    .t-base { font-weight: 600; }
    .r-Rare .t-head, .r-Rare .t-name, .r-Rare .t-base { color: #f4f06f; }
    .r-Magic .t-head, .r-Magic .t-base { color: #8aa6ff; }
    .r-Unique .t-head, .r-Unique .t-name, .r-Unique .t-base { color: #c08a45; }
    .r-Normal .t-base { color: #d7dbe0; }
    .t-body { padding: 8px 12px; font-size: 13px; }
    .t-class { font-size: 12px; }
    .t-prop, .t-meta { line-height: 1.5; }
    .t-prop .val, .t-meta .val { color: #fff; }
    .t-prop .aug { color: #6cb6ff; }
    .t-sep { height: 1px; background: #23272e; margin: 7px auto; width: 80%; }
    .t-mod { color: #8aa6ff; line-height: 1.55; }
    .t-mod.implicit { color: #b6c4ff; }
    .tier { display: inline-block; min-width: 26px; margin-right: 6px; font-size: 11px;
            font-weight: 700; border-radius: 3px; padding: 0 4px; vertical-align: middle; }
    .tier.pre { color: #ff9e80; background: #3a201a; }
    .tier.suf { color: #87c7ff; background: #16303f; }
    .t-mod .modlines { display: inline-block; vertical-align: top; }
    .t-mod.hybrid { border-left: 2px solid #2f4a6b; padding-left: 6px; }
    .t-mod.hybrid .modtext { display: block; }
    .t-mod.hybrid .tier { vertical-align: top; }
    .t-dps { color: #9aa1ab; font-size: 12px; }
    .qside { flex: none; width: 230px; display: flex; flex-direction: column; gap: 8px; }
    .why-h { color: #9be3a3; font-weight: 700; font-size: 12px; margin-bottom: 5px; }
    .why .reason { display: block; font-size: 12px; line-height: 1.35; color: #cfe9d5;
                   background: #16241a; border: 1px solid #2c5436; border-radius: 5px;
                   padding: 4px 7px; margin-bottom: 5px; }
    .qmeta { font-size: 12px; line-height: 1.5; }
    .qmeta .val { color: #fff; }
    .whisper { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .seen-tag { align-self: flex-start; }
    a.sort-on { font-weight: 700; }
    .qbar, .qpages { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .qbar { margin-bottom: 14px; } .qpages { margin-top: 12px; }

    /* --- records reactive table --- */
    .rec-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    table.rec th { cursor: pointer; user-select: none; white-space: nowrap;
                   position: sticky; top: 0; z-index: 2; background: #1b1e24; }
    table.rec th .arrow { color: #6cb6ff; }
    table.rec tbody tr.row { cursor: pointer; }
    table.rec tbody tr.row.alt { background: #15171c; }
    table.rec tbody tr.row:hover { background: #1f242c; }
    table.rec td.flag { text-align: center; }
    .pill.flagged { background: #1f4023; color: #9be3a3; }
    .rec-detail td { background: #101216; }
    .chk { display: inline-flex; gap: 5px; align-items: center; }

    /* --- archetype score badge + breakdown --- */
    .score-badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 9px;
                   border-radius: 10px; font-weight: 700; font-size: 12px; margin-bottom: 6px;
                   background: #23272e; }
    .score-badge .score-val { font-weight: 600; opacity: .85; }
    .tier-S { background: #3a2c10; color: #ffcf6b; }
    .tier-A { background: #16301c; color: #9be3a3; }
    .tier-B { background: #16263a; color: #8ab6ff; }
    .tier-C { background: #26292f; color: #aeb6c0; }
    .tier-D { background: #26292f; color: #8b929c; }
    .score-bd { font-size: 12px; margin-top: 8px; }
    .score-bd .arch { margin: 6px 0; padding: 7px 9px; border: 1px solid #2a2f37;
                      border-radius: 6px; background: #15171c; }
    .score-bd table { width: 100%; border-collapse: collapse; margin: 4px 0 0; }
    .score-bd th, .score-bd td { text-align: left; padding: 2px 6px; border-bottom: 1px solid #23272e;
                                 white-space: nowrap; }
    .score-bd th { color: #9aa1ab; font-weight: 600; }
    .score-bd .num { text-align: right; font-variant-numeric: tabular-nums; }
    .score-bd .miss { color: #ff8a8a; } .score-bd .hit { color: #9be3a3; }
    .score-bd summary { cursor: pointer; color: #9aa1ab; }

    /* --- per-checker chips (queue list + detail card) --- */
    .chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 2px 8px;
            border-radius: 11px; border: 1px solid color-mix(in srgb, var(--chip) 50%, #23272e);
            background: color-mix(in srgb, var(--chip) 12%, #15171c); }
    .chip-label { font-weight: 600; color: var(--chip); }
    .chip-count { opacity: .75; color: #cdd3db; }
    .chip-score-v { font-weight: 700; color: var(--tier); font-variant-numeric: tabular-nums;
            padding-left: 6px; border-left: 1px solid color-mix(in srgb, var(--chip) 35%, #23272e); }
    .chip-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--chip); display: inline-block; }

    /* --- unified detail card: archetype breakdown + upgrade paths (queue modal + records expand) --- */
    .rp-head { display: flex; gap: 10px; align-items: center; margin: 8px 0 6px; }
    .rp-warn { font-size: 12px; color: #d0a85a; background: #241f14; border: 1px solid #5a4a26;
               border-radius: 5px; padding: 6px 9px; margin: 6px 0 10px; }
    .rp-warn a { color: #e0c074; }
    .rp-tabs { display: flex; gap: 6px; border-bottom: 1px solid #23272e; margin-bottom: 8px; }
    .rp-tab { background: none; border: none; color: #9aa1ab; padding: 6px 10px; cursor: pointer;
              border-bottom: 2px solid transparent; font: inherit; }
    .rp-tab.on { color: #e8ebef; border-bottom-color: #8ab6ff; }
    .rp-pane { display: none; } .rp-pane.on { display: block; }
    .rp-noslot-row { display: inline-flex; gap: 5px; align-items: center; font-size: 12px;
                     color: #9aa1ab; margin: 2px 0 8px; }
    .rp-rule, .rp-target { border: 1px solid #23272e; border-radius: 6px; margin: 5px 0; background: #15171c; }
    .rp-rule > summary { padding: 6px 9px; cursor: pointer; display: flex; gap: 8px;
                         align-items: center; flex-wrap: wrap; }
    /* Rule name is never truncated — let it wrap to full lines (queue modal + records detail). */
    .rp-rule > summary strong, .rp-target-head strong { white-space: normal; overflow-wrap: anywhere; }
    .rp-detail { padding: 6px 10px 9px; border-top: 1px solid #23272e; font-size: 12px; }
    .rp-reqs { width: 100%; border-collapse: collapse; margin-top: 6px; }
    .rp-reqs th, .rp-reqs td { text-align: left; padding: 2px 6px; border-bottom: 1px solid #23272e; }
    .rp-reqs th { color: #9aa1ab; font-weight: 600; } .rp-reqs .num { text-align: right; }
    .rp-reqs .hit { color: #9be3a3; } .rp-reqs .miss { color: #8b929c; }
    .rp-target { padding: 7px 9px; }
    .rp-target-head { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .rp-target-head .rp-target-cov { margin-left: auto; }
    .rp-missing { width: 100%; border-collapse: collapse; margin: 6px 0 4px; font-size: 12px; }
    .rp-missing th, .rp-missing td { text-align: left; padding: 2px 6px; border-bottom: 1px solid #23272e; }
    .rp-missing th { color: #9aa1ab; font-weight: 600; }
    .rp-slot { font-size: 11px; padding: 0 6px; border-radius: 8px; border: 1px solid #3a3f48; }
    .rp-slot-prefix { color: #8ab6ff; border-color: #34536e; }
    .rp-slot-suffix { color: #d0a85a; border-color: #6e5a34; }
    .rp-slot-both { color: #c79be3; border-color: #5a3f6e; }
    .rp-target-foot { font-size: 12px; }
    .rp-off { opacity: .45; }

    /* "archive is stale — re-evaluate" prompt (queue + rules) */
    .stale-banner { display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      background: #241f14; border: 1px solid #5a4a26; border-radius: 6px;
      padding: 8px 12px; margin: 0 0 14px; color: #e0c074; }
    .stale-banner button { border-color: #6e5a34; }

    /* right-panel blocks (queue card + detail popup): matches / details / actions */
    .qside { gap: 0; }                       /* blocks provide rhythm via padding + dividers */
    .qside > .qblock { padding: 7px 0; }
    .qside > .qblock + .qblock { border-top: 1px solid #23272e; }
    .qside > .qmatches { padding-top: 0; }
    .qmeta-line { font-size: 12px; line-height: 1.5; }
    .qmeta-line .val { color: #fff; }
    /* price line: "Price  ~12 div · 64%   [↻]" */
    .price-line { display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 13px; }
    .price-line .pl-k { color: #9aa1ab; }
    .price-line .pl-v { color: #e0c074; }
    .price-line .pl-v.muted { color: #8b929c; }
    .price-line .pl-btn { margin-left: auto; font-size: 11px; padding: 2px 9px; }
    /* actions block */
    .qactions .qbtn-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .qactions button { font-size: 12px; padding: 3px 9px; }
    .note-toggle { background: none; border: none; color: #9aa1ab; font-size: 12px;
      cursor: pointer; padding: 4px 0 0; text-align: left; }
    .note-toggle.has-note { color: #8ab6ff; }
    .trade-link { display: inline-block; margin-top: 4px; font-size: 12px; color: #8ab6ff;
      text-decoration: none; }
    .trade-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <a class="brand" href="{{ url_for('records') }}" title="Stashler">
        <img src="{{ url_for('static', filename='stashler.png') }}" alt="Stashler">
        <span class="name">Stashler</span>
      </a>
      <a class="navlink" href="{{ url_for('records') }}">Records</a>
      <a class="navlink" href="{{ url_for('queue') }}">Queue <span id="s-queue" class="pill" style="display:none">0</span></a>
      <a class="navlink" href="{{ url_for('rules') }}">Rules</a>
      <a class="navlink" href="{{ url_for('log') }}">Log</a>
      <a class="navlink" id="nav-settings" href="{{ url_for('settings') }}">Settings</a>
      <button id="btn-auto" title="Keep the archive current: the app polls for new listings and runs periodic full backfills automatically">Auto-refresh: off</button>
      <span class="rate-toggle"
            title="Restrictive reserves part of the API budget so browsing the trade site in your browser doesn't trip the per-IP limit">
        <span class="muted">Rate:</span>
        <button id="rm-full" class="seg">Full</button>
        <button id="rm-restrictive" class="seg">Restrictive</button>
      </span>
      <span class="spacer"></span>
    </div>
    <div class="status">
      <div>
        <div>Mode: <span id="s-mode" class="pill">…</span>
          <span id="s-pricing" class="pill live" style="display:none"></span></div>
        <div class="muted"><span id="s-total">0</span> archived ·
          <span id="s-new">0</span> new this session</div>
        <div class="muted" id="s-error"></div>
      </div>
      <div>
        <div class="muted">Rate limits</div>
        <div id="s-buckets" class="buckets"></div>
      </div>
      <div class="feed">
        <div class="muted">Query feed</div>
        <div id="s-feed"></div>
      </div>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    let st = {};
    async function post(url) { try { await fetch(url, {method: 'POST'}); } catch (e) {} await refresh(); }
    // Single capture control. Disable on click (anti-spam) and let refresh() restore the
    // correct enabled/label state; while the loop is winding down it stays disabled.
    const autoBtn = document.getElementById('btn-auto');
    autoBtn.onclick = async () => {
      if (autoBtn.disabled) return;
      autoBtn.disabled = true;
      await post((st.auto_state === 'off' || !st.auto_state) ? '/api/auto/start' : '/api/auto/stop');
    };
    // Manual backfill controls removed: Auto-refresh manages backfill vs. light poll itself.
    // Live-websocket controls removed: PoE2 encrypts the live payload (see runtime.py).
    document.getElementById('rm-full').onclick = () => post('/api/rate_mode/full');
    document.getElementById('rm-restrictive').onclick = () => post('/api/rate_mode/restrictive');

    // --- shared, readable timestamps: "3h ago" with the full local time on hover ---
    function relTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      const s = (Date.now() - d.getTime()) / 1000, a = Math.abs(s);
      let r;
      if (a < 45) r = 'just now';
      else if (a < 3600) r = Math.round(a / 60) + 'm';
      else if (a < 86400) r = Math.round(a / 3600) + 'h';
      else if (a < 2592000) r = Math.round(a / 86400) + 'd';
      else r = d.toLocaleDateString();
      return (r === 'just now' || r.includes('/')) ? r : (s >= 0 ? r + ' ago' : 'in ' + r);
    }
    function formatTimes(root) {
      (root || document).querySelectorAll('[data-ts]').forEach(el => {
        const iso = el.dataset.ts;
        if (!iso) { el.textContent = '—'; return; }
        el.textContent = relTime(iso);
        const d = new Date(iso);
        if (!isNaN(d)) el.title = d.toLocaleString();
      });
    }
    window.relTime = relTime; window.formatTimes = formatTimes;

    // Wire the shared detail card (_detail_card.html) wherever it's injected — the queue modal
    // and the records row-expansion both call this. Handles tab switching, the per-rule disable
    // toggles (global; persisted via the API, no re-eval), and the "show matches without open
    // slot" filter. Idempotent per container.
    function wireDetailCard(root) {
      root.querySelectorAll('.rp-tab').forEach(tab => {
        tab.onclick = () => {
          const name = tab.dataset.tab;
          root.querySelectorAll('.rp-tab').forEach(t => t.classList.toggle('on', t === tab));
          root.querySelectorAll('.rp-pane').forEach(p => p.classList.toggle('on', p.dataset.pane === name));
        };
      });
      root.querySelectorAll('.rp-toggle').forEach(cb => {
        cb.onchange = async () => {
          cb.disabled = true;
          try {
            const r = await fetch('/api/rules/' + encodeURIComponent(cb.dataset.archId) + '/enabled',
              {method: 'POST', headers: {'Content-Type': 'application/json'},
               body: JSON.stringify({enabled: cb.checked})});
            if (!r.ok) throw new Error('http ' + r.status);
          } catch (e) { cb.checked = !cb.checked; cb.disabled = false; return; }
          const row = cb.closest('.rp-rule, .rp-target');
          if (row) row.classList.toggle('rp-off', !cb.checked);
          cb.disabled = false;
        };
      });
      const noslot = root.querySelector('.rp-noslot');
      if (noslot) {
        const apply = () => root.querySelectorAll('.rp-rule[data-noslot="1"]')
          .forEach(row => { row.style.display = noslot.checked ? '' : 'none'; });
        noslot.onchange = apply; apply();
      }
      root.querySelectorAll('.price-line').forEach(wirePriceLine);
    }
    window.wireDetailCard = wireDetailCard;

    // --- on-demand price line (shared by queue cards + the detail popup) -----------------
    // The cached estimate is rendered server-side; the Check/↻ button enqueues a background,
    // rate-limited search, and the page's status poll (applyPricingStatus) flips this line to
    // queued/pricing and re-reads the value when it lands. Refused until the Phase-0 stat data
    // is harvested — see PRICING_MODULE_PLAN.md.
    const fmtNum = n => (Math.round((+n) * 100) / 100).toString();
    function renderPriceLine(line, res) {
      const v = line.querySelector('.pl-v'), btn = line.querySelector('.pl-btn');
      const e = res && res.estimate;
      if (e && !(e.is_floor && (e.n_samples || 0) === 0)) {
        const floor = e.is_floor ? '≥ ' : '';
        const conf = e.is_floor ? '' : ' · ' + Math.round((e.confidence || 0) * 100) + '%';
        v.textContent = floor + fmtNum(e.value) + ' ' + e.currency + conf;
        v.className = 'pl-v';
      } else if (e && e.is_floor) {
        v.textContent = 'too thin to price'; v.className = 'pl-v muted';
      } else {
        v.textContent = 'not checked'; v.className = 'pl-v muted';
      }
      btn.textContent = '↻'; btn.disabled = false;   // always the refresh icon
    }
    async function refreshPriceLine(line) {
      try {
        renderPriceLine(line, await (await fetch('/api/price/' + encodeURIComponent(line.dataset.hash))).json());
      } catch (e) {}
    }
    function wirePriceLine(line) {
      const btn = line.querySelector('.pl-btn');
      btn.onclick = async () => {
        const v = line.querySelector('.pl-v');
        // Check readiness (Phase-0 interlock) before showing "queued".
        let res = null;
        try { res = await (await fetch('/api/price/' + encodeURIComponent(line.dataset.hash))).json(); } catch (e) {}
        if (res && res.can_refresh === false) {
          v.textContent = res.refresh_reason || 'pricing unavailable'; v.className = 'pl-v muted'; return;
        }
        btn.disabled = true; line.dataset.busy = '1';
        v.textContent = '⋯ queued…'; v.className = 'pl-v muted';
        try { await fetch('/api/price/' + encodeURIComponent(line.dataset.hash), {method: 'POST'}); }
        catch (e) { btn.disabled = false; line.dataset.busy = ''; }
      };
    }
    window.wirePriceLine = wirePriceLine;
    // Reflect background pricing on whichever cards are in flight; refresh the value on finish.
    function applyPricingStatus(pr) {
      const inProg = pr.in_progress, queued = new Set(pr.queued_hashes || []);
      document.querySelectorAll('.price-line').forEach(line => {
        const h = line.dataset.hash, v = line.querySelector('.pl-v'), btn = line.querySelector('.pl-btn');
        if (h === inProg) {
          v.textContent = '⟳ pricing…'; v.className = 'pl-v muted'; btn.disabled = true; line.dataset.busy = '1';
        } else if (queued.has(h)) {
          v.textContent = '⋯ queued…'; v.className = 'pl-v muted'; btn.disabled = true; line.dataset.busy = '1';
        } else if (line.dataset.busy === '1') {
          line.dataset.busy = ''; refreshPriceLine(line);   // just finished → pull the value
        }
      });
    }

    function bucket(b) {
      const pct = b.max_hits ? Math.min(100, 100 * b.used / b.max_hits) : 0;
      const effPct = b.max_hits ? Math.min(100, 100 * b.limit_eff / b.max_hits) : 100;
      const cls = b.restricted ? 'bad' : (b.used >= b.limit_eff ? 'warn' : '');
      return `<div class="bucket ${cls}">
        <div>${b.used}/${b.limit_eff}<small> of ${b.max_hits} /${b.period}s</small></div>
        <div class="bar"><span style="width:${pct}%"></span><i class="mark" style="left:${effPct}%"></i></div>
        <small>${b.reset_in > 0 ? '~' + Math.ceil(b.reset_in) + 's' : 'clear'}</small>
      </div>`;
    }

    async function refresh() {
      let s;
      try { s = await (await fetch('/api/status')).json(); } catch (e) { return; }
      st = s;
      const mode = document.getElementById('s-mode');
      mode.textContent = s.mode;
      mode.className = 'pill ' + (s.backfill_running ? 'backfill'
        : s.live_connected ? 'live'
        : s.mode === 'reconnecting' ? 'reconnecting' : '');
      document.getElementById('s-total').textContent = s.items_total;
      document.getElementById('s-new').textContent = s.session_new;
      const queueBadge = document.getElementById('s-queue');
      if (queueBadge) {
        queueBadge.textContent = s.queue_unseen;
        queueBadge.style.display = s.queue_unseen > 0 ? '' : 'none';
        queueBadge.classList.toggle('live', s.queue_unseen > 0);
      }
      document.title = (s.queue_unseen > 0 ? '(' + s.queue_unseen + ') ' : '') + 'Stashler';
      // Flag missing credentials: red Settings link + a disabled capture button.
      const setupOk = s.setup_ok;
      const settingsLink = document.getElementById('nav-settings');
      if (settingsLink) {
        settingsLink.classList.toggle('attn', !setupOk);
        settingsLink.textContent = setupOk ? 'Settings' : 'Settings ⚠';
      }

      const state = s.auto_state || 'off';
      if (!setupOk) {
        autoBtn.textContent = 'Auto-refresh: off';
        autoBtn.disabled = true; autoBtn.classList.remove('active');
        autoBtn.title = 'Set your account name and POESESSID in Settings first';
      } else if (state === 'stopping') {
        autoBtn.textContent = 'Auto-refresh: stopping…';
        autoBtn.disabled = true; autoBtn.classList.remove('active');
      } else {
        autoBtn.textContent = 'Auto-refresh: ' + state;
        autoBtn.disabled = false;
        autoBtn.classList.toggle('active', state === 'on');
        autoBtn.title = 'Keep the archive current: the app polls for new listings and runs periodic full backfills automatically';
      }

      const errEl = document.getElementById('s-error');
      if (s.last_error) errEl.textContent = '⚠ ' + s.last_error;
      else if (state !== 'off' && s.auto_last_result)
        errEl.textContent = 'auto: ' + s.auto_last_result + (s.auto_last_poll ? ' · ' + s.auto_last_poll : '');
      else errEl.textContent = '';

      document.getElementById('rm-full').classList.toggle('active', s.rate_mode === 'full');
      document.getElementById('rm-restrictive').classList.toggle('active', s.rate_mode === 'restrictive');

      const pr = s.pricing || {};
      const pe = document.getElementById('s-pricing');
      if (pe) {
        const busy = (pr.queued || 0) + (pr.in_progress ? 1 : 0);
        pe.textContent = busy ? ('pricing ' + busy + ' item' + (busy === 1 ? '' : 's') + '…') : '';
        pe.style.display = busy ? '' : 'none';
      }
      applyPricingStatus(pr);   // flip per-card price lines that are queued / in flight

      let html = '';
      for (const [policy, buckets] of Object.entries(s.rate_limits || {})) {
        html += `<div><small class="muted">${policy}</small> ${buckets.map(bucket).join('')}</div>`;
      }
      document.getElementById('s-buckets').innerHTML = html;

      document.getElementById('s-feed').innerHTML = (s.recent_queries || []).map(q =>
        `<div><span class="${q.status}">${q.kind}</span>
         <span class="muted">${q.target || ''}</span>
         ${q.http_code || ''} ${q.detail ? '· ' + q.detail : ''}</div>`).join('');
    }
    formatTimes();          // server-rendered timestamps (queue, etc.)
    document.querySelectorAll('.price-line').forEach(wirePriceLine);  // queue/records cards
    refresh();
    setInterval(() => { refresh(); formatTimes(); }, 1500);  // keep "ago" times fresh
  </script>
</body>
</html>
