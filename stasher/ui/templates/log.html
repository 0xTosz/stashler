{% extends "base.html" %}
{% block content %}
<div style="display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap;">
  <strong>Query log</strong>
  <span class="muted">{{ count }} most-recent entries (oldest first)</span>
  <span style="flex:1"></span>
  <button id="copy-log">Copy all</button>
  <a href="{{ url_for('log') }}">Refresh</a>
  <label class="muted" style="display:flex; gap:5px; align-items:center;">
    <input type="checkbox" id="auto"> auto-refresh
  </label>
</div>
<p class="muted" style="margin:0 0 8px">Full, untruncated rows for copy/paste — useful with
  <code>STASHER_LIVE_DEBUG=1</code> to capture live-socket frames.</p>
<textarea id="logbox" readonly spellcheck="false" class="code">{{ text }}</textarea>
<style>
  textarea.code { width:100%; height:72vh; font:12px/1.45 ui-monospace,Consolas,monospace;
    background:#0c0d11; color:#d7dbe0; border:1px solid #2a2f37; border-radius:6px;
    padding:8px 10px; white-space:pre; overflow:auto; resize:vertical; }
</style>
<script>
  document.getElementById('copy-log').onclick = async () => {
    const box = document.getElementById('logbox');
    box.select();
    try { await navigator.clipboard.writeText(box.value); }
    catch (e) { document.execCommand('copy'); }
  };
  let timer = null;
  document.getElementById('auto').onchange = (e) => {
    if (e.target.checked) timer = setInterval(() => location.reload(), 3000);
    else if (timer) clearInterval(timer);
  };
</script>
{% endblock %}
