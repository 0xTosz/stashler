{% extends "base.html" %}
{% block content %}
<div class="rec-toolbar">
  <input id="rec-q" type="text" placeholder="Search name / type…">
  <select id="rec-rarity">
    <option value="">Any rarity</option>
    {% for r in ["Normal", "Magic", "Rare", "Unique", "Gem", "Currency"] %}
      <option value="{{ r }}">{{ r }}</option>
    {% endfor %}
  </select>
  <label class="chk"><input type="checkbox" id="rec-flagged"> Flagged only</label>
  <button id="rec-clear">Clear</button>
  <span class="muted" id="rec-count">loading…</span>
</div>

<table class="rec">
  <thead>
    <tr>
      <th data-key="name">Item</th>
      <th data-key="type">Type</th>
      <th data-key="rarity">Rarity</th>
      <th data-key="price">Price</th>
      <th data-key="flagged">Flag</th>
      <th data-key="matches">Matches</th>
      <th data-key="why">Why</th>
      <th data-key="fetched">Fetched</th>
    </tr>
  </thead>
  <tbody id="rec-body"></tbody>
</table>

<div class="qpages">
  <button id="rec-prev">← Prev</button>
  <span class="muted" id="rec-page"></span>
  <button id="rec-next">Next →</button>
  <span class="muted">· click a row to inspect</span>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let ALL = [], view = [], sortKey = 'fetched', sortDir = -1, page = 1;
  const PAGE = 100;
  const cardCache = {};

  function esc(s) {
    return (s == null ? '' : String(s)).replace(/[&<>"]/g,
      m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  }

  async function load() {
    try { ALL = await (await fetch('/api/records')).json(); } catch (e) { ALL = []; }
    apply();
  }

  function apply() {
    const q = $('rec-q').value.trim().toLowerCase();
    const rar = $('rec-rarity').value;
    const flaggedOnly = $('rec-flagged').checked;
    view = ALL.filter(r => {
      if (rar && r.rarity !== rar) return false;
      if (flaggedOnly && !r.flagged) return false;
      if (q && !((r.name + ' ' + r.type).toLowerCase().includes(q))) return false;
      return true;
    });
    sortView();
  }

  function sortView() {
    const k = sortKey, d = sortDir;
    view.sort((a, b) => {
      let av = a[k], bv = b[k];
      if (k === 'flagged') { av = a.flagged ? 1 : 0; bv = b.flagged ? 1 : 0; }
      else if (k === 'matches') { av = a.reasons.length; bv = b.reasons.length; }
      else if (k === 'why') { av = a.reasons[0] || ''; bv = b.reasons[0] || ''; }
      if (av < bv) return -d; if (av > bv) return d; return 0;
    });
    page = 1; render();
  }

  function render() {
    const total = view.length;
    const pages = Math.max(1, Math.ceil(total / PAGE));
    if (page > pages) page = pages;
    const rows = view.slice((page - 1) * PAGE, (page - 1) * PAGE + PAGE);
    const body = $('rec-body');
    body.innerHTML = '';
    if (!rows.length) {
      body.innerHTML = '<tr><td colspan="8" class="muted">No items. Turn on Auto-refresh, '
        + 'or run a backfill, to populate the archive.</td></tr>';
    }
    for (const r of rows) {
      const tr = document.createElement('tr');
      tr.className = 'row'; tr.dataset.hash = r.hash;
      const why = r.reasons.length
        ? esc(r.reasons[0]) + (r.reasons.length > 1 ? ' <span class="muted">+' + (r.reasons.length - 1) + '</span>' : '')
        : '<span class="muted">—</span>';
      tr.innerHTML =
        '<td>' + (esc(r.name) || '<span class="muted">—</span>') + '</td>' +
        '<td>' + (esc(r.type) || '<span class="muted">—</span>') + '</td>' +
        '<td>' + (esc(r.rarity) || '—') + '</td>' +
        '<td class="muted">' + (esc(r.price) || '—') + '</td>' +
        '<td class="flag">' + (r.flagged ? '<span class="pill flagged">✓</span>' : '') + '</td>' +
        '<td class="flag">' + (r.reasons.length ? '<span class="pill flagged">' + r.reasons.length + '</span>' : '<span class="muted">0</span>') + '</td>' +
        '<td>' + why + '</td>' +
        '<td class="muted">' + esc(r.fetched) + '</td>';
      tr.onclick = () => toggle(tr, r.hash);
      body.appendChild(tr);
    }
    $('rec-count').textContent = total + ' item' + (total === 1 ? '' : 's')
      + (total !== ALL.length ? ' (of ' + ALL.length + ')' : '');
    $('rec-page').textContent = 'Page ' + page + ' / ' + pages;
    $('rec-prev').disabled = page <= 1;
    $('rec-next').disabled = page >= pages;
    document.querySelectorAll('table.rec th').forEach(th => {
      const old = th.querySelector('.arrow'); if (old) old.remove();
      if (th.dataset.key === sortKey) {
        const s = document.createElement('span');
        s.className = 'arrow'; s.textContent = sortDir > 0 ? ' ▲' : ' ▼';
        th.appendChild(s);
      }
    });
  }

  async function toggle(tr, hash) {
    const next = tr.nextElementSibling;
    if (next && next.classList.contains('rec-detail')) { next.remove(); return; }
    document.querySelectorAll('.rec-detail').forEach(e => e.remove());
    const dtr = document.createElement('tr');
    dtr.className = 'rec-detail';
    const td = document.createElement('td');
    td.colSpan = 8; td.innerHTML = '<span class="muted">loading…</span>';
    dtr.appendChild(td); tr.after(dtr);
    if (cardCache[hash]) { td.innerHTML = cardCache[hash]; return; }
    try {
      const html = await (await fetch('/records/' + hash + '/card')).text();
      cardCache[hash] = html; td.innerHTML = html;
    } catch (e) { td.innerHTML = '<span class="error">failed to load</span>'; }
  }

  document.querySelectorAll('table.rec th').forEach(th => {
    th.onclick = () => {
      const k = th.dataset.key;
      if (sortKey === k) sortDir *= -1;
      else { sortKey = k; sortDir = (k === 'fetched') ? -1 : 1; }
      sortView();
    };
  });
  $('rec-q').oninput = apply;
  $('rec-rarity').onchange = apply;
  $('rec-flagged').onchange = apply;
  $('rec-clear').onclick = () => {
    $('rec-q').value = ''; $('rec-rarity').value = ''; $('rec-flagged').checked = false; apply();
  };
  $('rec-prev').onclick = () => { if (page > 1) { page--; render(); } };
  $('rec-next').onclick = () => { page++; render(); };
  load();
</script>
{% endblock %}
